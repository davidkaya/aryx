name: CI and release

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - '*'

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-15-intel
            label: macOS (x64)
          - os: macos-15
            label: macOS (arm64)
          - os: ubuntu-latest
            label: Linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run web tests
        run: bun run test

      - name: Run sidecar tests
        run: bun run sidecar:test

      - name: Build the application
        run: bun run build

  create-release:
    name: Create GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists."
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes
          fi

  publish-release-assets:
    name: Publish release asset (${{ matrix.label }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-15-intel
            label: macOS (x64)
          - os: macos-15
            label: macOS (arm64)
          - os: ubuntu-latest
            label: Linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare Apple signing assets
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_CERT_P12_BASE64" ]]; then
            echo "Missing required secret: APPLE_CERT_P12_BASE64" >&2
            exit 1
          fi
          if [[ -z "$APPLE_CERT_PASSWORD" ]]; then
            echo "Missing required secret: APPLE_CERT_PASSWORD" >&2
            exit 1
          fi
          if [[ -z "$APPLE_API_KEY_P8" ]]; then
            echo "Missing required secret: APPLE_API_KEY_P8" >&2
            exit 1
          fi
          if [[ -z "$APPLE_API_KEY_ID" ]]; then
            echo "Missing required secret: APPLE_API_KEY_ID" >&2
            exit 1
          fi
          if [[ -z "$APPLE_API_ISSUER" ]]; then
            echo "Missing required secret: APPLE_API_ISSUER" >&2
            exit 1
          fi
          if [[ -z "$APPLE_TEAM_ID" ]]; then
            echo "Missing required secret: APPLE_TEAM_ID" >&2
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/apple-signing.p12"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"

          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$APPLE_API_KEY_P8" > "$API_KEY_PATH"

          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$APPLE_CERT_PASSWORD" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"

      - name: Build and publish release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun run publish-release
